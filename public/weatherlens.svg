<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Definitions -->
  <defs>
    <!-- Sun Gradient -->
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCD34D" />
      <stop offset="100%" stop-color="#F59E0B" />
    </linearGradient>

    <!-- Cloud Gradient -->
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E0F2FE" />
      <stop offset="30%" stop-color="#BAE6FD" />
      <stop offset="100%" stop-color="#38BDF8" />
    </linearGradient>

    <!-- Tech/Lens Ring Gradient -->
    <linearGradient id="lensGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="100%" stop-color="#818CF8" />
    </linearGradient>

    <!-- Shadows -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Abstract Background Rings representing atmospheric pressure / data layers -->
  <g stroke="currentColor" fill="none" transform="translate(256, 256)">
    <circle cx="0" cy="0" r="220" stroke="rgba(56, 189, 248, 0.1)" stroke-width="4" stroke-dasharray="16 24"/>
    <circle cx="0" cy="0" r="180" stroke="rgba(56, 189, 248, 0.05)" stroke-width="2" />
  </g>

  <!-- Sun Base -->
  <circle cx="320" cy="180" r="90" fill="url(#sunGrad)" filter="url(#softShadow)" />

  <!-- The Lens/Aperture elements bridging the Sun and Cloud -->
  <g stroke="url(#lensGrad)" stroke-width="6" stroke-linecap="round" fill="none" transform="translate(320, 180)">
    <circle cx="0" cy="0" r="120" opacity="0.4" stroke-dasharray="8 32"/>
    <path d="M -80 -80 L -60 -60 M 80 80 L 60 60 M 80 -80 L 60 -60" stroke-width="6" opacity="0.6" />
    <circle cx="0" cy="0" r="50" stroke-width="3" stroke="rgba(255,255,255,0.6)" stroke-dasharray="6 12" />
  </g>

  <!-- Primary Volumetric Cloud -->
  <path 
    d="M 160 380 
       C 110 380 80 340 80 290 
       C 80 230 130 190 190 190 
       C 210 140 280 120 340 160 
       C 390 140 460 170 460 250 
       C 460 320 400 380 340 380 
       Z" 
    fill="url(#cloudGrad)" 
    filter="url(#softShadow)" 
  />

  <!-- Subtle Inner Highlights for Cloud Volume -->
  <path 
    d="M 180 200 
       C 210 160 270 140 320 175" 
    stroke="white" 
    stroke-width="12" 
    stroke-linecap="round" 
    opacity="0.6" 
    fill="none" 
  />
  <path 
    d="M 100 280 
       C 100 240 130 210 170 205" 
    stroke="white" 
    stroke-width="10" 
    stroke-linecap="round" 
    opacity="0.5" 
    fill="none" 
  />

  <!-- Center "Lens" Focal Point (Data Scanner Motif) -->
  <g transform="translate(260, 280)" filter="url(#softShadow)">
    <circle cx="0" cy="0" r="60" fill="#0F172A" opacity="0.9" />
    <circle cx="0" cy="0" r="50" fill="none" stroke="url(#lensGrad)" stroke-width="8" stroke-dasharray="78 12" />
    <circle cx="0" cy="0" r="30" fill="#38BDF8" opacity="0.25" />
    
    <!-- Crosshairs/Reticle -->
    <path d="M 0 -24 L 0 24 M -24 0 L 24 0" stroke="#38BDF8" stroke-width="4" stroke-linecap="round" />
    <circle cx="0" cy="0" r="8" fill="none" stroke="#BAE6FD" stroke-width="3" />
    
    <!-- Data points -->
    <circle cx="-18" cy="-18" r="5" fill="#6366F1" />
    <circle cx="18" cy="18" r="5" fill="#38BDF8" />
    <circle cx="-18" cy="18" r="5" fill="#FCD34D" />
  </g>
</svg>
